{% extends "base.html" %}

{% block title %}{{ code }} | RideQuest{% endblock %}

{% block content %}
<section class="error-section">
  <div class="container text-center">
    <p class="error-code">{{ code }}</p>
    <h1 class="display-5 fw-bold">{{ heading }}</h1>
    <p class="lead text-secondary mx-auto" style="max-width: 620px;">{{ message }}</p>
    <a class="btn btn-rq btn-lg mt-3" href="{{ url_for('main.index') }}">Return to RideQuest</a>
  </div>
</section>
{% endblock %}
